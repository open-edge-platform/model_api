name: Build Docs

on:
  workflow_dispatch: # run on request (no need for PR)
  push:
    branches:
      - master

permissions: {} # No permissions by default on workflow level

jobs:
  Build-Docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            releases.astral.sh:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.13"

      - name: Install dependencies
        run: |
          uv --directory model_api sync --locked --group docs

      - name: Build Docs
        working-directory: model_api
        run: uv run make -C docs html

      - name: Branch name
        id: branch_name
        run: |
          echo "SOURCE_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Create gh-pages branch
        env:
          SOURCE: ${{steps.branch_name.outputs.SOURCE_NAME}}
        run: |
          if [[ ${{github.event_name}} == 'workflow_dispatch' ]]; then
            echo RELEASE_VERSION="test_build" >> $GITHUB_ENV
          else
            echo RELEASE_VERSION=${GITHUB_REF#refs/*/} >> $GITHUB_ENV
          fi
          echo SOURCE_NAME=${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT
          echo SOURCE_BRANCH=${GITHUB_REF#refs/heads/} >> $GITHUB_OUTPUT
          echo SOURCE_TAG=${GITHUB_REF#refs/tags/} >> $GITHUB_OUTPUT

          existed_in_remote=$(git ls-remote --heads origin gh-pages)

          if [[ -z ${existed_in_remote} ]]; then
            echo "Creating gh-pages branch"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git checkout --orphan gh-pages
            git reset --hard
            echo '<html><head><meta http-equiv="refresh" content="0; url=latest/" /></head></html>' > index.html
            git add index.html
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initializing gh-pages branch"
            git push origin gh-pages
            git checkout "${SOURCE}"
            echo "Created gh-pages branch"
          else
            echo "Branch gh-pages already exists"
          fi

      - name: Commit docs to gh-pages branch
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          git fetch
          git checkout gh-pages
          mkdir -p /tmp/docs_build
          cp -r model_api/docs/build/html/* /tmp/docs_build/
          rm -rf "$RELEASE_VERSION"/*
          echo '<html><head><meta http-equiv="refresh" content="0; url=latest/" /></head></html>' > index.html
          mkdir -p "$RELEASE_VERSION"
          cp -r /tmp/docs_build/* ./"$RELEASE_VERSION"
          rm -rf /tmp/docs_build
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [[ "$RELEASE_VERSION" != 'test_build' ]]; then
            ln -sfn "$RELEASE_VERSION" latest
          fi
          git add ./latest "$RELEASE_VERSION"
          git add index.html
          git commit -m "Update documentation" -a || true

      - name: Push changes
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
